##############################################
# ConfigMap 1: BOOM application config
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: boom-config
  namespace: umn-babamul
data:
  config.yaml: |
    database:
      host: mongo
      port: 27017
      name: boom
      max_pool_size: 200
      replica_set: null
      username: mongoadmin
      password: ""
      srv: false
    api:
      domain: "localhost"
      port: 4000
      auth:
        secret_key: ""
        token_expiration: 604800
        admin_username: admin
        admin_password: ""
        admin_email: admin@example.com
    babamul:
      enabled: false
      webapp_url:
      retention_days: 3
    redis:
      host: valkey
      port: 6379
    kafka:
      consumer:
        ztf:
          server: "broker:29092"
          group_id: "boom-ztf-nrp"
        lsst:
          server: "usdf-alert-stream-dev.lsst.cloud:9094"
          schema_registry: "https://usdf-alert-schemas-dev.slac.stanford.edu"
          schema_github_fallback_url: "https://github.com/lsst/alert_packet/tree/main/python/lsst/alert/packet/schema"
          group_id: ""
          username: ""
          password: ""
        decam:
          server: "broker:29092"
          group_id: ""
      producer:
        server: "broker:29092"
    workers:
      ztf:
        command_interval: 500
        filter_refresh_interval_minutes: 15
        alert:
          n_workers: 3
        enrichment:
          n_workers: 3
        filter:
          n_workers: 3
      lsst:
        command_interval: 500
        filter_refresh_interval_minutes: 15
        alert:
          n_workers: 4
        enrichment:
          n_workers: 3
        filter:
          n_workers: 1
      decam:
        command_interval: 500
        filter_refresh_interval_minutes: 15
        alert:
          n_workers: 1
        enrichment:
          n_workers: 0
        filter:
          n_workers: 1
    crossmatch:
      ztf:
        - catalog: PS1_DR1
          radius: 2.0
          use_distance: false
          projection:
            _id: 1
            gMeanPSFMag: 1
            gMeanPSFMagErr: 1
            rMeanPSFMag: 1
            rMeanPSFMagErr: 1
            iMeanPSFMag: 1
            iMeanPSFMagErr: 1
            zMeanPSFMag: 1
            zMeanPSFMagErr: 1
            yMeanPSFMag: 1
            yMeanPSFMagErr: 1
            ra: 1
            dec: 1
        - catalog: Gaia_DR3
          radius: 2.0
          use_distance: false
          projection:
            _id: 1
            parallax: 1
            parallax_error: 1
            phot_g_mean_mag: 1
            phot_bp_mean_mag: 1
            phot_rp_mean_mag: 1
            ra: 1
            dec: 1
        - catalog: milliquas_v6
          radius: 2.0
          use_distance: false
          projection:
            _id: 1
            Name: 1
            Descrip: 1
            Qpct: 1
            ra: 1
            dec: 1
        - catalog: NED
          radius: 300.0
          use_distance: true
          distance_key: "z"
          distance_max: 30.0
          distance_max_near: 300.0
          projection:
            _id: 1
            ra: 1
            dec: 1
            objtype: 1
            z: 1
            z_unc: 1
            z_tech: 1
            z_qual: 1
            DistMpc: 1
            DistMpc_unc: 1
            ebv: 1
            m_Ks: 1
            m_Ks_unc: 1
            tMASSphot: 1
            Mstar: 1
            Mstar_unc: 1
      lsst: []
      decam: []
---
##############################################
# ConfigMap 2: Kafka JAAS config
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-jaas
  namespace: umn-babamul
data:
  kafka_server_jaas.conf: |
    KafkaServer {
      org.apache.kafka.common.security.scram.ScramLoginModule required;
    };
---
##############################################
# ConfigMap 3: Kafka ACL init script
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-acl-init-script
  namespace: umn-babamul
data:
  init_kafka_acls.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    BROKER="${KAFKA_BOOTSTRAP_SERVER:-broker:29092}"
    ADMIN_USER="admin"
    ADMIN_PWD="${KAFKA_ADMIN_PASSWORD}"
    READ_USER="readonly"
    READ_PWD="${KAFKA_READONLY_PASSWORD}"
    TIMEOUT=60

    kafka_log() { echo "[init-kafka] $*"; }

    wait_for_kafka() {
      local start=$(date +%s)
      kafka_log "Waiting for Kafka at $BROKER (cluster-id)"
      until /opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server "$BROKER" >/dev/null 2>&1; do
        if (( $(date +%s) - $start > $TIMEOUT )); then
          kafka_log "Timed out waiting for cluster-id from $BROKER"; exit 1
        fi
        sleep 3
      done

      local start=$(date +%s)
      kafka_log "Waiting for metadata quorum readiness"
      until /opt/kafka/bin/kafka-metadata-quorum.sh --bootstrap-server "$BROKER" describe --status >/dev/null 2>&1; do
        if (( $(date +%s) - $start > $TIMEOUT )); then
          kafka_log "Timed out waiting for metadata quorum"; exit 1
        fi
        sleep 3
      done

      local start=$(date +%s)
      kafka_log "Waiting for configs API"
      until /opt/kafka/bin/kafka-configs.sh --bootstrap-server "$BROKER" --entity-type users --describe >/dev/null 2>&1; do
        if (( $(date +%s) - $start > $TIMEOUT )); then
          kafka_log "Timed out waiting for configs API"; exit 1
        fi
        sleep 3
      done

      local start=$(date +%s)
      kafka_log "Waiting for authorizer"
      until /opt/kafka/bin/kafka-acls.sh --bootstrap-server "$BROKER" --list >/dev/null 2>&1; do
        if (( $(date +%s) - $start > $TIMEOUT )); then
          kafka_log "Timed out waiting for authorizer"; exit 1
        fi
        sleep 3
      done

      kafka_log "Kafka is ready"
    }

    wait_for_kafka

    user_exists() {
      /opt/kafka/bin/kafka-configs.sh --bootstrap-server "$BROKER" \
        --entity-type users --entity-name "$1" --describe 2>/dev/null | grep -q "Configs for user-principal 'User:$1'"
    }

    create_or_update_user() {
      local user=$1
      local pwd=$2
      local attempt=0
      local max_attempts=5
      while (( attempt < max_attempts )); do
        kafka_log "Creating/updating user $user (attempt $((attempt+1)))"
        if /opt/kafka/bin/kafka-configs.sh --bootstrap-server "$BROKER" \
            --alter --entity-type users --entity-name "$user" \
            --add-config "SCRAM-SHA-512=[password=$pwd]" >/dev/null 2>&1; then
            return 0
        fi
        attempt=$((attempt+1))
        sleep 4
      done
      kafka_log "Failed to create/update user $user" >&2
      exit 1
    }

    create_or_update_user "$ADMIN_USER" "$ADMIN_PWD"
    create_or_update_user "$READ_USER" "$READ_PWD"

    /opt/kafka/bin/kafka-acls.sh --bootstrap-server "$BROKER" \
      --add --allow-principal "User:$READ_USER" --operation DESCRIBE --cluster >/dev/null 2>&1 || true

    /opt/kafka/bin/kafka-acls.sh --bootstrap-server "$BROKER" \
      --add --allow-principal "User:$READ_USER" --operation READ --operation DESCRIBE --topic '*' >/dev/null 2>&1 || true

    /opt/kafka/bin/kafka-acls.sh --bootstrap-server "$BROKER" \
      --add --allow-principal "User:$READ_USER" --operation READ --group '*' >/dev/null 2>&1 || true

    kafka_log "Initialization complete"
---
##############################################
# ConfigMap 4: OpenTelemetry Collector config
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: umn-babamul
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch:

    exporters:
      otlphttp/prometheus:
        endpoint: "http://prometheus:9090/api/v1/otlp"
      debug:
        verbosity: detailed

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
                    without_type_suffix: true
                    without_units: true
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/prometheus]
---
##############################################
# ConfigMap 5: Prometheus config
##############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: umn-babamul
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    otlp:
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - deployment.environment.name

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector:8888"]

      - job_name: "kafka"
        static_configs:
          - targets: ["kafka-exporter:9308"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: "kafka-broker"

      - job_name: "valkey"
        scrape_interval: 2s
        static_configs:
          - targets: ["valkey-exporter:9121"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: "valkey"

      - job_name: "mongodb"
        static_configs:
          - targets: ["mongodb-exporter:9216"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: "mongodb"
