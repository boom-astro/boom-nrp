##############################################
# Kafka (KRaft mode) StatefulSet + PVC + Service
##############################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: umn-babamul
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-cephfs-east
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: broker
  namespace: umn-babamul
spec:
  serviceName: broker
  replicas: 1
  selector:
    matchLabels:
      app: broker
  template:
    metadata:
      labels:
        app: broker
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/kafka/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      containers:
        - name: broker
          image: apache/kafka:4.1.1
          ports:
            - containerPort: 29092
              name: internal
            - containerPort: 9092
              name: client
            - containerPort: 29093
              name: controller
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://broker:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:29093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_NUM_PARTITIONS
              value: "15"
            - name: KAFKA_SASL_ENABLED_MECHANISMS
              value: "SCRAM-SHA-512"
            - name: KAFKA_AUTHORIZER_CLASS_NAME
              value: "org.apache.kafka.metadata.authorizer.StandardAuthorizer"
            - name: KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND
              value: "true"
            - name: KAFKA_SUPER_USERS
              value: "User:admin;User:ANONYMOUS"
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf -Djava.security.egd=file:/dev/./urandom"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-jaas
              mountPath: /etc/kafka/kafka_server_jaas.conf
              subPath: kafka_server_jaas.conf
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "/opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server localhost:29092 >/dev/null 2>&1"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "/opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server localhost:29092 >/dev/null 2>&1"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: kafka-data
          emptyDir: {}
        - name: kafka-jaas
          configMap:
            name: kafka-jaas
---
apiVersion: v1
kind: Service
metadata:
  name: broker
  namespace: umn-babamul
spec:
  selector:
    app: broker
  publishNotReadyAddresses: true
  ports:
    - name: internal
      port: 29092
      targetPort: 29092
    - name: client
      port: 9092
      targetPort: 9092
  clusterIP: None
---
##############################################
# Kafka ACL Init Job (runs once after Kafka starts)
##############################################
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-acl-init
  namespace: umn-babamul
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: kafka-acl-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-acl-init
          image: apache/kafka:4.1.1
          command: ["bash", "/scripts/init_kafka_acls.sh"]
          env:
            - name: KAFKA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boom-secrets
                  key: KAFKA_ADMIN_PASSWORD
            - name: KAFKA_READONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boom-secrets
                  key: KAFKA_READONLY_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVER
              value: "broker:29092"
          volumeMounts:
            - name: init-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: init-script
          configMap:
            name: kafka-acl-init-script
            defaultMode: 0755
